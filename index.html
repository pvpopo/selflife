<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ShelfLife — plan meals, shop smart, waste less</title>
  <meta name="description" content="Meal planning driven by what's in your pantry: diet-aware weekly plans, store price comparison, receipt scanning, and estimated expiration tracking." />
  <meta name="theme-color" content="#2E6E3E" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- signed-out -->
  <main id="auth-root" hidden></main>

  <!-- signed-in shell -->
  <div id="app-root" hidden>
    <main id="view" class="view" tabindex="-1"></main>

    <nav class="tabbar" aria-label="Main">
      <button class="tab" data-route="plan" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M3 9.5h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Plan</span>
      </button>
      <button class="tab" data-route="recipes" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4.5A2.5 2.5 0 0 1 7.5 2H19v17.5H7.5A2.5 2.5 0 0 0 5 22z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M5 19.5A2.5 2.5 0 0 1 7.5 17H19" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M9.5 7h5.5M9.5 10.5H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Recipes</span>
      </button>
      <button class="tab" data-route="shop" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 4h2.2l2 11.5a1.6 1.6 0 0 0 1.6 1.3h8.6a1.6 1.6 0 0 0 1.6-1.3L20.5 8H6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9.6" cy="20.4" r="1.4" fill="currentColor"/><circle cx="16.8" cy="20.4" r="1.4" fill="currentColor"/></svg>
        <span>Shop</span>
      </button>
      <button class="tab" data-route="pantry" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="3" width="16" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M4 12h16M9.5 7.5h5M9.5 16.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Pantry</span>
      </button>
      <button class="tab" data-route="account" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.6" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M4.8 20.2c1.3-3.4 4-5 7.2-5s5.9 1.6 7.2 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Account</span>
      </button>
    </nav>
  </div>

  <!-- data & engines (classic scripts: runs from file:// and any static host) -->
  <script src="./js/util.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/data/foods.js"></script>
  <script src="./js/data/recipes.js"></script>
  <script src="./js/data/stores.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/auth-cloud.js"></script>
  <script src="./js/expiry.js"></script>
  <script src="./js/nutrition.js"></script>
  <script src="./js/inventory.js"></script>
  <script src="./js/nonfood.js"></script>
  <script src="./js/subs.js"></script>
  <script src="./js/planner.js"></script>
  <script src="./js/shopping.js"></script>
  <script src="./js/receipt.js"></script>
  <script src="./js/agent.js"></script>
  <script src="./js/cartlink.js"></script>
  <script src="./js/kroger.js"></script>
  <script src="./js/recipedb.js"></script>
  <!-- views -->
  <script src="./js/views/views-common.js"></script>
  <script src="./js/views/views-plan.js"></script>
  <script src="./js/views/views-recipes.js"></script>
  <script src="./js/views/views-shop.js"></script>
  <script src="./js/views/views-pantry.js"></script>
  <script src="./js/views/views-account.js"></script>
  <!-- boot -->
  <script src="./js/app.js"></script>
</body>
</html>
